<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREDVENT – HR & Payroll</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0ede8;--bg4:#e8e4dc;
  --border:#e0dbd2;--border2:#ccc6bb;
  --text:#1a1814;--text2:#5a5548;--text3:#9a9080;
  --orange:#e8660a;--orange2:#d45a08;--orange3:#bf5007;
  --orange-bg:#fff4ec;--orange-border:#fbd5b5;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-border:#99f6e4;
  --pink:#db2777;--pink-bg:#fdf2f8;--pink-border:#fbcfe8;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 16px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1.5px solid var(--border);display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.logo-area{padding:17px 20px 15px;display:flex;align-items:center;gap:11px;border-bottom:1.5px solid var(--border)}
.logo-box{width:38px;height:38px;background:linear-gradient(135deg,#e8660a,#bf5007);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(232,102,10,.35);flex-shrink:0}
.logo-name{font-size:17px;font-weight:900;color:var(--orange);letter-spacing:-.5px}
.logo-sub{font-size:9.5px;color:var(--text3);font-weight:500;margin-top:1px}
.nav-body{flex:1;overflow-y:auto;padding:12px 10px}
.nav-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.3px;padding:0 8px;margin:12px 0 5px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--orange-bg);color:var(--orange);font-weight:600}
.ni i{width:15px;text-align:center;font-size:13px;color:var(--text3)}
.ni.on i{color:var(--orange)}
.sf{padding:13px 17px;border-top:1.5px solid var(--border);display:flex;align-items:center;gap:9px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urole{font-size:10px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1.5px solid var(--border);padding:0 26px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:22px 26px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* CARDS */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh)}
.card-flat{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 16px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.mc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:15px 17px;box-shadow:var(--sh);position:relative;overflow:hidden}
.mc .bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r2) var(--r2) 0 0}
.mc-lbl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.mc-val{font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1;font-family:var(--mono)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:5px}
.mc-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.07}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-or{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.b-gr{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-re{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.b-am{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-bl{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.b-pu{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.b-te{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.b-pi{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-border)}
.b-gy{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:var(--font)}
.btn-p{background:var(--orange);color:#fff;box-shadow:0 1px 4px rgba(232,102,10,.3)}
.btn-p:hover{background:var(--orange2);transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-g:hover{background:var(--bg3);border-color:var(--border2)}
.btn-d{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-border)}
.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-xs{padding:3px 8px;font-size:11px}

/* FORMS */
.fg{margin-bottom:13px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 11px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .12s,box-shadow .12s}
input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,102,10,.1)}
select option{background:#fff;color:var(--text)}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--orange);cursor:pointer}
.req{color:var(--red);margin-left:2px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* TABLE */
.tw{border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:10px 13px;background:var(--bg3);border-bottom:1.5px solid var(--border);white-space:nowrap;text-align:left}
td{padding:11px 13px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;border:1.5px solid var(--border)}
.tab{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .12s;white-space:nowrap}
.tab.on{background:var(--bg2);color:var(--orange);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* CALENDAR */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch{font-size:9.5px;font-weight:700;color:var(--text3);text-align:center;padding:4px 2px;text-transform:uppercase}
.cd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative}
.cd:hover{filter:brightness(.95);transform:scale(1.05)}
.cd.today-ring{border-color:var(--orange)!important;font-weight:800}
.cd.empty{opacity:0;pointer-events:none}

/* STATUS CELL (attendance grid) */
.sc{width:22px;height:22px;border-radius:4px;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;transition:all .12s;border:1.5px solid}
.sc:hover{transform:scale(1.25);box-shadow:0 2px 6px rgba(0,0,0,.15)}

/* STATUS PICKER */
.spk{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sp{padding:10px 6px;border:2px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .12s}
.sp:hover{border-color:var(--border2);background:var(--bg3)}
.sp.sel{border-color:var(--orange);background:var(--orange-bg)}
.sp-code{font-size:13px;font-weight:800;margin-bottom:3px;font-family:var(--mono)}
.sp-name{font-size:9px;font-weight:600;color:var(--text3);line-height:1.2}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(26,24,20,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r3);width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-sm{max-width:420px}
.modal-md{max-width:540px}
.modal-lg{max-width:700px}
.modal-xl{max-width:860px}
.mh{padding:17px 22px 15px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:var(--r3) var(--r3) 0 0}
.modal-ttl{font-size:15px;font-weight:700}
.mx{cursor:pointer;color:var(--text3);font-size:17px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.mx:hover{background:var(--bg3);color:var(--text)}
.mb{padding:20px 22px}
.mf{padding:13px 22px;border-top:1.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg3);border-radius:0 0 var(--r3) var(--r3)}

/* PAYSLIP */
.ps{background:#fff;border-radius:var(--r2);overflow:hidden;font-family:var(--font);border:1.5px solid #e5e7eb}
.psh{background:linear-gradient(135deg,#e8660a,#9a3d07);color:#fff;padding:22px 26px}
.ps-co{font-size:22px;font-weight:900;letter-spacing:-.5px}
.ps-tg{font-size:11px;opacity:.75;margin-top:2px}
.ps-mr{display:flex;gap:22px;margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.2);flex-wrap:wrap}
.ps-mi .lbl{font-size:9.5px;opacity:.6;margin-bottom:2px}
.ps-mi .val{font-size:13px;font-weight:700}
.psb{padding:22px 26px;color:#1a1814}
.ps-emp{display:flex;justify-content:space-between;padding-bottom:14px;border-bottom:1.5px solid #e5e5e5;margin-bottom:15px;flex-wrap:wrap;gap:12px}
.ps-en{font-size:20px;font-weight:900;color:#e8660a;margin-bottom:3px}
.ps-ei{font-size:12px;color:#666;line-height:1.8}
.ps-ar{display:flex;gap:0;margin-bottom:15px;border:1.5px solid #e5e5e5;border-radius:8px;overflow:hidden}
.ps-ai{flex:1;padding:9px 5px;text-align:center;border-right:1px solid #e5e5e5}
.ps-ai:last-child{border-right:none}
.ps-av{font-size:18px;font-weight:800;font-family:'DM Mono',monospace}
.ps-al{font-size:9px;color:#888;margin-top:2px}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.ps-tbl{width:100%;border-collapse:collapse;border:1.5px solid #e5e5e5;border-radius:8px;overflow:hidden}
.ps-tbl th{background:#f8f8f8;padding:8px 11px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid #e5e5e5;text-align:left}
.ps-tbl td{padding:8px 11px;font-size:12.5px;border-bottom:1px solid #f0f0f0;color:#333}
.ps-tbl tr:last-child td{border-bottom:none;font-weight:700;background:#fafafa}
.ps-net{background:linear-gradient(135deg,#fff4ec,#ffe0c3);border:2px solid #fbd5b5;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.ps-nl{font-size:15px;font-weight:700;color:#e8660a}
.ps-nv{font-size:26px;font-weight:900;color:#e8660a;font-family:'DM Mono',monospace}
.ps-dn{margin-top:10px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;font-size:11px;color:#92400e;line-height:1.6}
.ps-ft{padding:12px 26px;background:#f8f8f8;border-top:1.5px solid #e5e5e5;display:flex;justify-content:space-between;font-size:11px;color:#999;flex-wrap:wrap;gap:6px}

/* LOGIN */
.lp{min-height:100vh;background:linear-gradient(135deg,#fff4ec 0%,#f5f4f0 50%,#fde8d4 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.lc{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:36px;width:420px;max-width:100%;box-shadow:0 8px 32px rgba(232,102,10,.12)}
.ll-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.ll-box{width:46px;height:46px;background:linear-gradient(135deg,#e8660a,#bf5007);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;color:#fff;box-shadow:0 3px 10px rgba(232,102,10,.4);flex-shrink:0}
.ll-name{font-size:24px;font-weight:900;color:var(--orange);letter-spacing:-.5px}
.ll-sub{font-size:11px;color:var(--text3);margin-top:2px}
.rc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ro{padding:14px;border:2px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;text-align:center}
.ro:hover{border-color:var(--border2);background:var(--bg3)}
.ro.sel{border-color:var(--orange);background:var(--orange-bg)}
.ro i{font-size:22px;margin-bottom:8px;display:block}
.ro .rn{font-size:13px;font-weight:700}
.ro .rd{font-size:10.5px;color:var(--text3);margin-top:2px}
.err{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r);padding:10px 13px;font-size:12.5px;color:var(--red);margin-bottom:14px;display:flex;gap:8px;align-items:center}

/* NOTIFY */
.notif{position:fixed;top:18px;right:18px;background:#fff;border:1.5px solid var(--orange-border);border-left:4px solid var(--orange);border-radius:var(--r);padding:12px 16px;font-size:13px;font-weight:500;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:var(--sh2);max-width:320px;animation:slin .3s ease}
@keyframes slin{from{transform:translateX(130%);opacity:0}to{transform:translateX(0);opacity:1}}

/* UTILS */
.row{display:flex;align-items:center;gap:10px}
.jb{display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.sx{overflow-x:auto}
.sx::-webkit-scrollbar{height:4px}
.sx::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.st{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.st i{color:var(--orange)}
.div{height:1.5px;background:var(--border);margin:14px 0}
.muted{color:var(--text3)}
.modal-ttl{font-size:15px;font-weight:700}
.mon{font-family:var(--mono)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:36px;margin-bottom:12px;opacity:.25;display:block}
.empty p{font-size:13px}
.info{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;background:var(--orange-bg);border:1px solid var(--orange-border);border-radius:var(--r);font-size:12px;color:var(--orange);margin-bottom:12px}
.info i{margin-top:1px;flex-shrink:0}
.sec-hdr{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script>
// ╔══════════════════════════════════════════════════════════════════════╗
// ║  CREDVENT – Attendance & Payroll System                             ║
// ╚══════════════════════════════════════════════════════════════════════╝

// ── CONSTANTS ─────────────────────────────────────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
const TEAM_COLORS=['#e8660a','#7c3aed','#0d9488','#2563eb','#db2777','#16a34a','#d97706','#64748b','#c2410c','#4338ca'];
const TEAM_ICONS=['💼','🔧','🎨','📈','📢','💰','⚙️','🏢','🚀','🔬'];

const STATUS = {
  P:   {code:'P',   label:'Present',        short:'P',  clr:'#15803d',bg:'#dcfce7',bdr:'#86efac'},
  LL:  {code:'LL',  label:'Late Login',      short:'LL', clr:'#a16207',bg:'#fef9c3',bdr:'#fde047'},
  HD:  {code:'HD',  label:'Half Day',        short:'HD', clr:'#1d4ed8',bg:'#dbeafe',bdr:'#93c5fd'},
  LLHD:{code:'LLHD',label:'Late + Half Day', short:'LH', clr:'#92400e',bg:'#fef3c7',bdr:'#fcd34d'},
  A:   {code:'A',   label:'Absent',          short:'A',  clr:'#b91c1c',bg:'#fee2e2',bdr:'#fca5a5'},
  PH:  {code:'PH',  label:'Public Holiday',  short:'PH', clr:'#6d28d9',bg:'#f5f3ff',bdr:'#c4b5fd'},
  J:   {code:'J',   label:'Jelly Leave',     short:'J',  clr:'#be185d',bg:'#fdf2f8',bdr:'#f9a8d4'},
  SH:  {code:'SH',  label:'Sunday Holiday',  short:'SH', clr:'#64748b',bg:'#f1f5f9',bdr:'#cbd5e1'},
  SW:  {code:'SW',  label:'Sunday Work',     short:'SW', clr:'#065f46',bg:'#ecfdf5',bdr:'#6ee7b7'},
};
const ALL_STATUSES = ['P','LL','HD','LLHD','A','PH','J','SH','SW'];

// ── DATABASE ──────────────────────────────────────────────────────────────
const DB = {
  teams: [],            // {id, name, manager, color, icon}
  employees: [],        // {id, name, empCode, designation, joinDate, teamId, grossSalary, pfOpted, loginId}
  attendance: {},       // {empId: {dateKey: statusCode}}
  credentials: {},      // {loginId: {empId, password}}
  publicHolidays: {},   // {dateKey: {name}}
  admin: {id:'admin', password:'admin123'},
};

let _eid = 1;
let _tid = 1;
const USE_SUPABASE = Boolean(
  window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
  !window.SUPABASE_URL.includes('<') && !window.SUPABASE_ANON_KEY.includes('<')
);
let supabaseClient = null;
let SUPABASE_READY = false;

async function initSupabase(){
  if(!USE_SUPABASE) return;
  if(!window.supabase){
    console.warn('Supabase client library not loaded');
    notify('Supabase client not available');
    return;
  }
  supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  try{
    await loadSupabaseData();
    SUPABASE_READY = true;
    notify('Supabase connected');
  }catch(err){
    console.error('Supabase load failed', err);
    notify('Supabase connection failed');
  }
}

async function loadSupabaseData(){
  if(!supabaseClient) return;

  const [teamsRes, employeesRes, attendanceRes, holidaysRes, adminCredRes] = await Promise.all([
    supabaseClient.from('teams').select('*'),
    supabaseClient.from('employees').select('*'),
    supabaseClient.from('attendance').select('*'),
    supabaseClient.from('public_holidays').select('*'),
    supabaseClient.from('admin_credentials').select('*').limit(1),
  ]);

  const errors = [teamsRes, employeesRes, attendanceRes, holidaysRes, adminCredRes].filter(r=>r.error);
  if(errors.length){
    throw new Error(errors.map(r=>r.error?.message||'Unknown').join(' | '));
  }

  DB.teams = teamsRes.data || [];
  DB.employees = (employeesRes.data || []).map(e=>({
    id: e.id,
    name: e.name,
    empCode: e.emp_code||e.empCode,
    designation: e.designation,
    joinDate: e.join_date||e.joinDate,
    teamId: e.team_id||e.teamId,
    grossSalary: parseFloat(e.gross_salary||e.grossSalary||0)||0,
    pfOpted: !!(e.pf_opted||e.pfOpted),
    pfEmployeeDeduction: parseFloat(e.pf_employee_deduction||e.pfEmployeeDeduction||900) || 900,
    pfEmployerContribution: parseFloat(e.pf_employer_contribution||e.pfEmployerContribution||900) || 900,
    professionalTax: parseFloat(e.professional_tax||e.professionalTax||200) || 200,
    loginId: e.login_id||e.loginId,
    password: e.password||'',
  }));
  DB.attendance = {};
  (attendanceRes.data || []).forEach(row=>{
    if(!row.employee_id||!row.date_key) return;
    if(!DB.attendance[row.employee_id]) DB.attendance[row.employee_id] = {};
    DB.attendance[row.employee_id][row.date_key] = row.comment ? {status: row.status, comment: row.comment} : row.status;
  });
  DB.publicHolidays = {};
  (holidaysRes.data || []).forEach(row=>{
    if(row.date_key) DB.publicHolidays[row.date_key] = {name: row.name};
  });
  const adminCred = (adminCredRes.data || [])[0] || null;
  if(adminCred){
    DB.admin.id = adminCred.username || DB.admin.id;
    DB.admin.password = adminCred.password || DB.admin.password;
  }
  DB.credentials = {};
  DB.employees.forEach(emp=>{
    if(emp.loginId) DB.credentials[emp.loginId] = {empId: emp.id, password: emp.password || ''};
  });

  const maxE = DB.employees.reduce((max,e)=>Math.max(max, parseInt((e.id||'').replace(/\D/g,''))||0), 0);
  const maxT = DB.teams.reduce((max,t)=>Math.max(max, parseInt((t.id||'').replace(/\D/g,''))||0), 0);
  _eid = maxE + 1;
  _tid = maxT + 1;
}

// ── TIME HELPERS ───────────────────────────────────────────────────────────
const NOW = new Date();
const CY = NOW.getFullYear(), CM = NOW.getMonth(), CD = NOW.getDate();

function dim(y,m){return new Date(y,m+1,0).getDate()}
function fd(y,m){return new Date(y,m,1).getDay()}
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function isSun(y,m,d){return new Date(y,m,d).getDay()===0}
function isToday(y,m,d){return y===CY&&m===CM&&d===CD}
function canEditDate(y,m,d){
  if(y< CY || (y===CY && m<CM)) return true;
  if(y===CY && m===CM) return d<=CD;
  return false;
}
function maxEditableDate(y,m){
  if(y< CY || (y===CY && m<CM)) return dk(y,m,dim(y,m));
  if(y===CY && m===CM) return todayKey();
  return dk(y,m,1);
}
function daysPassedInMonth(y,m){
  if(y===CY && m===CM) return Math.min(dim(y,m), CD);
  return dim(y,m);
}
function todayKey(){return dk(CY,CM,CD)}
function fmtDate(s){if(!s)return '—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}

// ── DATA HELPERS ───────────────────────────────────────────────────────────
function getEmp(id){return DB.employees.find(e=>e.id===id)}
function getTeam(id){return DB.teams.find(t=>t.id===id)}
function teamEmps(tid){return tid&&tid!=='all'?DB.employees.filter(e=>e.teamId===tid):DB.employees}
function ini(name){return (name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
function fmtC(n){return '₹'+Math.round(n||0).toLocaleString('en-IN')}
function isPH(y,m,d){return !!DB.publicHolidays[dk(y,m,d)]}

function normalizeAttendanceEntry(entry){
  if(typeof entry === 'string') return {status: entry, comment: ''};
  if(entry && typeof entry === 'object') return {status: entry.status || '', comment: entry.comment || ''};
  return {status: '', comment: ''};
}

function statusFor(empId,y,m,d){
  const manual = normalizeAttendanceEntry(DB.attendance[empId]?.[dk(y,m,d)]);
  if(manual.status) return manual.status;
  if(isPH(y,m,d)) return 'PH';
  if(isSun(y,m,d)) return 'SH';
  return null;
}

function attDetail(empId,y,m,d){
  const key=dk(y,m,d);
  const manual=normalizeAttendanceEntry(DB.attendance[empId]?.[key]);
  const status=manual.status || (isPH(y,m,d)?'PH':isSun(y,m,d)?'SH':null);
  const label=status?STATUS[status]?.label:'Click to mark';
  const comment=manual.comment?.trim()||'';
  return {status, label, comment, key, title: comment ? `${label} — ${comment}` : label};
}

function attSummary(empId,y,m){
  const days=daysPassedInMonth(y,m);
  const r={P:0,LL:0,HD:0,LLHD:0,A:0,PH:0,J:0,SH:0,SW:0};
  for(let d=1;d<=days;d++){const s=statusFor(empId,y,m,d);if(s)r[s]=(r[s]||0)+1;}
  return r;
}

function calcPay(empId,y,m){
  const emp=getEmp(empId);
  if(!emp)return null;
  const gross=parseFloat(emp.grossSalary)||0;
  const perDay=gross/30;
  const s=attSummary(empId,y,m);
  const daysPassed=daysPassedInMonth(y,m);
  const halfDays = s.HD + s.LLHD;
  const absentDays = s.A + s.J;
  const earningDays = daysPassed;
  const earned = perDay * earningDays;
  const absentDed = absentDays * perDay;
  const halfDayDed = halfDays * (perDay / 2);
  const attendanceDed = absentDed + halfDayDed;
  const totalLL = s.LL + s.LLHD;
  let llDed=0;
  if(totalLL>0){const t1=Math.min(totalLL,3),t2=Math.max(0,totalLL-3);llDed=t1*150+t2*200;}
  const pfEmp = emp.pfOpted ? (parseFloat(emp.pfEmployeeDeduction) || 900) : 0;
  const pfEr  = emp.pfOpted ? (parseFloat(emp.pfEmployerContribution) || 900) : 0;
  const pfDed = pfEmp + pfEr;
  const pt    = emp.pfOpted ? (parseFloat(emp.professionalTax) || 200) : 0;
  const totalDed = attendanceDed + llDed + pfDed + pt;
  const net = earned - totalDed;
  return {gross,perDay,earningDays,earned,halfDays,absentDays,absentDed,halfDayDed,attendanceDed,daysPassed,totalLL,llDed,pfEmp,pfEr,pfDed,pt,totalDed,net,s};
}

window.deleteTeam=function(id){
  if(!confirm('Delete this team? Employees will be unassigned.'))return;
  DB.teams=DB.teams.filter(t=>t.id!==id);
  DB.employees.forEach(e=>{if(e.teamId===id)e.teamId=null});
  render();notify('Team deleted');
  if(supabaseClient) deleteTeamFromSupabase(id);
}

window.deleteEmp=function(id){

}

          const sm=attSummary(emp.id,y,m);

              <div class="row" style="gap:7px">
                <div class="av" style="width:26px;height:26px;font-size:10px;background:${t?t.color+'20':'#f5f5f5'};color:${t?t.color:'#888'}">${ini(emp.name)}</div>
                <div><div style="font-size:12px;font-weight:600">${emp.name}</div><div class="mon" style="font-size:10px;color:var(--text3)">${emp.empCode}</div></div>
              </div>
            </td>
            ${nums.map(d=>{
              const detail=attDetail(emp.id,y,m,d);
              const s=detail.status;
              const st=s?STATUS[s]:null;

              const tip=editable ? detail.title : 'Locked — future date';
              return `<td style="padding:3px 2px;text-align:center">
                <div class="sc" ${editable?`onclick="openMarkModal('${emp.id}','${detail.key}')"`:''}

          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

  return `

      <div style="font-size:21px;font-weight:800;letter-spacing:-.3px">${emp.name}</div>

      <div class="mc-lbl">Days Present</div><div class="mc-val" style="color:var(--green)">${sm.P}</div><div class="mc-sub">${MONTHS[CM]}</div>

      <div class="mc-lbl">Attendance %</div><div class="mc-val" style="color:var(--orange)">${pct}%</div><div class="mc-sub">This month</div>

// CALENDAR RENDER
// ════════════════════════════════════════════════════════════════════════
function renderCal(empId,y,m){
  const days=dim(y,m),first=fd(y,m);
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="cd empty"></div>`;
  for(let d=1;d<=days;d++){
    const detail=attDetail(empId,y,m,d);
    const s=detail.status;
    const st=s?STATUS[s]:null;
    const it=isToday(y,m,d);
    const editable=canEditDate(y,m,d);
    const onclick=S.role==='admin'&&editable?`onclick="openMarkModal('${empId}','${detail.key}')"`:'';
    const tip=editable ? detail.title : 'Locked — future date';
    cells+=`<div class="cd${it?' today-ring':''}" 
      style="background:${st?st.bg:'transparent'};color:${st?st.clr:'var(--text3)'};border-color:${st?st.bdr:'transparent'};cursor:${editable?'pointer':'not-allowed'};opacity:${editable?1:0.45}"
      ${onclick} title="${tip}">${d}</div>`;
  }
  return `<div class="cg">${DAYS.map(d=>`<div class="ch">${d}</div>`).join('')}${cells}</div>`;
}

window.saveMarkAtt=async function(empId,dateStr){
  const s=S.modal._pick||document.querySelector('.sp.sel')?.dataset.code;

window.saveBulkAtt=async function(){
  const date=document.getElementById('b-date')?.value||todayKey();
  const status=document.getElementById('b-status')?.value;
  if(!status)return;
  let n=0;
  const syncOps=[];
  document.querySelectorAll('.bcb:checked').forEach(cb=>{
    const eid=cb.value;
    if(!DB.attendance[eid]) DB.attendance[eid]={};
    DB.attendance[eid][date]=status;
    n++;
    if(supabaseClient) syncOps.push(syncAttendanceToSupabase(eid,date,status));
  });
  if(syncOps.length) await Promise.all(syncOps);
  closeModal();
  notify(`${n} employee${n>1?'s':''} marked as ${STATUS[status].label}`);
}

window.saveEmp=async function(editId){
  const v=id=>document.getElementById(id)?.value||'';
  const name=v('e-nm').trim(), code=v('e-cd').trim(), desig=v('e-dg').trim();
  const joinDate=v('e-jd'), teamId=v('e-tm')||null;
  const grossSalary=parseFloat(v('e-gs'))||0;
  const uan=v('e-uan').trim();
  const loginId=v('e-li').trim(), password=v('e-pw').trim();
  const pfOpted=document.getElementById('e-pf')?.checked||false;
  if(!name||!code||!desig||!joinDate||!grossSalary||!loginId){notify('Please fill all required fields');return}
  if(grossSalary<=0){notify('Enter a valid salary');return}
  const isEdit=editId&&editId!=='null';
  if(!isEdit&&!password){notify('Password is required for new employees');return}

  if(isEdit){
    const emp=getEmp(editId);
    if(!emp){notify('Employee not found');return}
    const oldLid=emp.loginId;
    const loginTaken=DB.credentials[loginId] && DB.credentials[loginId].empId!==editId;
    if(loginTaken){notify('Login ID already taken. Use a different one.');return}
    if(oldLid&&oldLid!==loginId) delete DB.credentials[oldLid];
    Object.assign(emp,{
      name,empCode:code,designation:desig,joinDate,teamId,grossSalary,uan,pfOpted,loginId,
      pfEmployeeDeduction: emp.pfEmployeeDeduction || 900,
      pfEmployerContribution: emp.pfEmployerContribution || 900,
      professionalTax: emp.professionalTax || 200,
    });
    DB.credentials[loginId]={empId:editId,password:password||DB.credentials[oldLid]?.password||''};
    if(supabaseClient) await syncEmployeeToSupabase(emp,password);
    closeModal();notify(name+' updated');
    return;
  }

  if(DB.credentials[loginId]){notify('Login ID already taken. Use a different one.');return}
  const id='E'+String(_eid++).padStart(3,'0');
  const employee={
    id,name,empCode:code,designation:desig,joinDate,teamId,grossSalary,uan,pfOpted,loginId,
    pfEmployeeDeduction: 900,
    pfEmployerContribution: 900,
    professionalTax: 200,
  };
  DB.employees.push(employee);
  DB.credentials[loginId]={empId:id,password};
  if(supabaseClient) await syncEmployeeToSupabase(employee,password);
  closeModal();notify(name+' added! Login ID: '+loginId);
}

  .mc{background:#fff;border:1.5px solid #e0dbd2;border-radius:12px;padding:14px 16px}
  .row{display:flex;align-items:center;gap:8px}.jb{display:flex;justify-content:space-between;align-items:center}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card-flat{background:#f0ede8;border:1.5px solid #e0dbd2;border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .mon{font-family:'DM Mono',monospace}.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  .sx{overflow-x:auto}.st{font-size:14px;font-weight:700;margin-bottom:12px}
  @media print{body{background:#fff;padding:0}}</style>
  </head><body>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid #e0dbd2">
    <div style="width:42px;height:42px;background:linear-gradient(135deg,#e8660a,#bf5007);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff">C</div>
    <div><div style="font-size:20px;font-weight:900;color:#e8660a">CREDVENT</div><div style="font-size:11px;color:#9a9080">Monthly Report — ${MONTHS[m]} ${y}</div></div>
    <div style="margin-left:auto;font-size:11px;color:#9a9080">Generated: ${new Date().toLocaleDateString('en-IN')}</div>
  </div>
  ${content}
  </body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`CREDVENT_Report_${MONTHS[m]}_${y}.html`;
  a.click();
  notify('Report exported!');
}

window.changeAdminPw=function(){
  const cur=document.getElementById('s-cur')?.value;
  const user=(document.getElementById('s-user')?.value||'').trim();
  const nw=document.getElementById('s-new')?.value;
  const cnf=document.getElementById('s-cnf')?.value;
  if(!cur||!nw||!cnf){notify('Please fill all fields');return}
  if(cur!==DB.admin.password){notify('Current password is incorrect');return}
  if(nw!==cnf){notify('New passwords do not match');return}
  if(nw.length<4){notify('Password must be at least 4 characters');return}
  if(!user){notify('Admin username cannot be empty');return}
  DB.admin.id=user;
  DB.admin.password=nw;
  if(supabaseClient) syncAdminCredentialsToSupabase(user, nw);
  document.getElementById('s-cur').value='';
  document.getElementById('s-user').value=user;
  document.getElementById('s-new').value='';
  document.getElementById('s-cnf').value='';
  notify('Admin credentials updated successfully!');
}

window.resetEmpPw=async function(){
  const eid=document.getElementById('s-emp')?.value;
  const pw=document.getElementById('s-epw')?.value?.trim();
  if(!eid){notify('Please select an employee');return}
  if(!pw||pw.length<3){notify('Password must be at least 3 characters');return}
  const emp=getEmp(eid);
  if(!emp?.loginId){notify('Employee has no login ID');return}
  if(!DB.credentials[emp.loginId]){notify('No password record exists for this employee');return}
  DB.credentials[emp.loginId].password=pw;
  if(supabaseClient) await resetEmployeePasswordToSupabase(eid,pw);
  notify(`Password reset for ${emp.name}`);
}

window.clearAllData=async function(){
  if(!confirm('This will delete ALL teams, employees, attendance, and holiday data. This cannot be undone. Are you sure?'))return;
  if(!confirm('FINAL WARNING: All data will be permanently deleted. Confirm?'))return;
  DB.teams=[];DB.employees=[];DB.attendance={};DB.credentials={};DB.publicHolidays={};
  _eid=1;_tid=1;
  if(supabaseClient) await clearSupabaseData();
  set({page:'dashboard'});
  notify('All data cleared');
}

window.openMarkModal=function(empId,dateStr){

}
